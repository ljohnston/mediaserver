---

- name: 'create restic directory'
  ansible.builtin.file:
    path: '{{ plexuser_home }}/.restic'
    owner: '{{ plexuser.name }}'
    group: '{{ plexuser.name }}'
    mode: '0700'
    state: 'directory'

- name: 'create restic repo password file'
  copy:
    content: '{{ restic_repo_password }}'
    dest: '{{ plexuser_home }}/.restic/repo-password'
    owner: '{{ plexuser.name }}'
    group: '{{ plexuser.name }}'
    mode: '0600'

